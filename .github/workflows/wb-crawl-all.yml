name: World Bank Full Crawl

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Countries per batch"
        default: "15"
      start_batch:
        description: "Start from batch number (for resuming)"
        default: "1"
      indicators:
        description: "Comma-separated indicators (leave empty for all)"
        default: ""
  schedule:
    # Weekly full crawl on Sundays at 03:00 UTC
    - cron: "0 3 * * 0"

jobs:
  crawl:
    name: Crawl All Countries
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Configure parameters
        id: config
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '15' }}"
          START_BATCH="${{ github.event.inputs.start_batch || '1' }}"
          echo "batch_size=$BATCH_SIZE" >> "$GITHUB_OUTPUT"
          echo "start_batch=$START_BATCH" >> "$GITHUB_OUTPUT"

          # Write indicators to file to avoid shell escaping
          INPUT_INDICATORS="${{ github.event.inputs.indicators }}"
          if [ -z "$INPUT_INDICATORS" ]; then
            cat > /tmp/indicators.txt << 'INDEOF'
          NY.GDP.MKTP.CD,NY.GDP.MKTP.KD.ZG,NY.GDP.PCAP.CD,NY.GDP.PCAP.KD.ZG,FP.CPI.TOTL.ZG,NE.TRD.GNFS.ZS,BX.KLT.DINV.CD.WD,SL.UEM.TOTL.ZS,SL.TLF.CACT.ZS,SP.POP.TOTL,SP.POP.GROW,SP.URB.TOTL.IN.ZS,SP.DYN.LE00.IN,SH.XPD.CHEX.GD.ZS,SE.ADT.LITR.ZS,SE.XPD.TOTL.GD.ZS,EG.USE.ELEC.KH.PC,IT.NET.USER.ZS,EN.ATM.CO2E.PC,NY.GNP.PCAP.CD
          INDEOF
          else
            echo "$INPUT_INDICATORS" > /tmp/indicators.txt
          fi

          INDICATORS=$(cat /tmp/indicators.txt | tr -d '[:space:]')
          echo "indicators=$INDICATORS" >> "$GITHUB_OUTPUT"
          echo "Using batch_size=$BATCH_SIZE, start_batch=$START_BATCH"
          echo "Indicators: $INDICATORS"

      - name: Run batched crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ steps.config.outputs.batch_size }}
          START_BATCH: ${{ steps.config.outputs.start_batch }}
          INDICATORS: ${{ steps.config.outputs.indicators }}
        run: |
          set +e  # Don't exit on error — we handle failures per batch

          # ─── All ~217 World Bank country ISO3 codes ───────────────
          # Grouped by region for readability

          # East Asia & Pacific
          EAP=(ASM AUS BRN CHN FJI FSM GUM HKG IDN JPN KHM KIR KOR LAO MAC MHL MMR MNG MNP MYS NCL NRU NZL PHL PLW PNG PRK PYF SGP SLB SYC THA TKL TLS TON TUV TWN VNM VUT WSM)

          # Europe & Central Asia
          ECA=(ALB AND ARM AUT AZE BEL BGR BIH BLR CHE CYP CZE DEU DNK ESP EST FIN FRA FRO GBR GEO GRC GRL HRV HUN IMN IRL ISL ITA KAZ KGZ LIE LTU LUX LVA MDA MKD MNE NLD NOR POL PRT ROU RUS SMR SRB SVK SVN SWE TJK TKM TUR UKR UZB XKX)

          # Latin America & Caribbean
          LAC=(ABW ARG ATG BHS BLZ BOL BRA BRB CHL COL CRI CUB CUW CYM DMA DOM ECU GRD GTM GUY HND HTI JAM KNA LCA MEX NIC PAN PER PRI PRY SLV SUR SXM TCA TTO URY VCT VEN VGB VIR)

          # Middle East & North Africa
          MNA=(ARE BHR DJI DZA EGY IRN IRQ ISR JOR KWT LBN LBY MAR MLT OMN PSE QAT SAU SYR TUN YEM)

          # North America
          NAM=(BMU CAN USA)

          # South Asia
          SAR=(AFG BGD BTN IND LKA MDV NPL PAK)

          # Sub-Saharan Africa
          SSA=(AGO BDI BEN BFA BWA CAF CIV CMR COD COG COM CPV ERI ETH GAB GHA GIN GMB GNB GNQ KEN LBR LSO MDG MLI MOZ MRT MUS MWI NAM NER NGA RWA SDN SEN SLE SOM SSD STP SWZ TCD TGO TZA UGA ZAF ZMB ZWE)

          # Combine all countries
          ALL_COUNTRIES=("${EAP[@]}" "${ECA[@]}" "${LAC[@]}" "${MNA[@]}" "${NAM[@]}" "${SAR[@]}" "${SSA[@]}")

          TOTAL=${#ALL_COUNTRIES[@]}
          TOTAL_BATCHES=$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE ))

          echo "Total countries: $TOTAL"
          echo "Batch size: $BATCH_SIZE"
          echo "Total batches: $TOTAL_BATCHES"
          echo "Starting from batch: $START_BATCH"
          echo ""

          # Track results
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          SKIP_COUNT=0
          TOTAL_ROWS=0

          # Summary file
          echo "## World Bank Full Crawl Results" > /tmp/crawl-summary.md
          echo "" >> /tmp/crawl-summary.md
          echo "| Batch | Countries | HTTP | Rows | Status |" >> /tmp/crawl-summary.md
          echo "|-------|-----------|------|------|--------|" >> /tmp/crawl-summary.md

          for (( batch=1; batch<=TOTAL_BATCHES; batch++ )); do
            # Skip batches before start_batch
            if [ "$batch" -lt "$START_BATCH" ]; then
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            # Calculate batch slice
            START_IDX=$(( (batch - 1) * BATCH_SIZE ))
            BATCH_COUNTRIES=("${ALL_COUNTRIES[@]:$START_IDX:$BATCH_SIZE}")
            COUNTRY_CSV=$(IFS=,; echo "${BATCH_COUNTRIES[*]}")

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Batch $batch/$TOTAL_BATCHES: $COUNTRY_CSV"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Build JSON body using jq and /tmp file
            COUNTRIES_JSON=$(echo "$COUNTRY_CSV" | jq -R 'split(",")')
            INDICATORS_JSON=$(echo "$INDICATORS" | jq -R 'split(",")')

            jq -n \
              --argjson countries "$COUNTRIES_JSON" \
              --argjson indicators "$INDICATORS_JSON" \
              --arg batch_id "full-crawl-batch-${batch}" \
              --arg source "world_bank" \
              '{countries: $countries, indicators: $indicators, batch_id: $batch_id, source: $source}' \
              > /tmp/wb-batch-body.json

            # Call the Edge Function with 10-minute timeout
            HTTP_CODE=$(curl -s -o /tmp/wb-batch-response.json -w "%{http_code}" \
              --max-time 600 \
              -X POST \
              "${SUPABASE_URL}/functions/v1/wb-sync" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d @/tmp/wb-batch-body.json)

            RESPONSE=$(cat /tmp/wb-batch-response.json 2>/dev/null || echo "{}")
            ROWS=$(echo "$RESPONSE" | jq -r '.rows_inserted // 0' 2>/dev/null || echo "0")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Batch $batch/$TOTAL_BATCHES: $COUNTRY_CSV - $HTTP_CODE OK ($ROWS rows)"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              TOTAL_ROWS=$((TOTAL_ROWS + ROWS))
              echo "| $batch/$TOTAL_BATCHES | $COUNTRY_CSV | $HTTP_CODE | $ROWS | OK |" >> /tmp/crawl-summary.md
            else
              echo "::warning::Batch $batch/$TOTAL_BATCHES failed: HTTP $HTTP_CODE"
              echo "Response: $RESPONSE"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "| $batch/$TOTAL_BATCHES | $COUNTRY_CSV | $HTTP_CODE | - | FAILED |" >> /tmp/crawl-summary.md
            fi

            # Rate limit pause between batches (skip after last batch)
            if [ "$batch" -lt "$TOTAL_BATCHES" ]; then
              echo "Waiting 5s before next batch..."
              sleep 5
            fi
          done

          # Final summary
          echo ""
          echo "============================================"
          echo "CRAWL COMPLETE"
          echo "  Successful batches: $SUCCESS_COUNT"
          echo "  Failed batches:     $FAIL_COUNT"
          echo "  Skipped batches:    $SKIP_COUNT"
          echo "  Total rows upserted: $TOTAL_ROWS"
          echo "============================================"

          echo "" >> /tmp/crawl-summary.md
          echo "### Summary" >> /tmp/crawl-summary.md
          echo "- **Successful:** $SUCCESS_COUNT" >> /tmp/crawl-summary.md
          echo "- **Failed:** $FAIL_COUNT" >> /tmp/crawl-summary.md
          echo "- **Skipped:** $SKIP_COUNT" >> /tmp/crawl-summary.md
          echo "- **Total rows:** $TOTAL_ROWS" >> /tmp/crawl-summary.md
          echo "- **Completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> /tmp/crawl-summary.md

          # Write to GitHub Step Summary
          cat /tmp/crawl-summary.md >> "$GITHUB_STEP_SUMMARY"

          # Fail the job only if ALL batches failed
          if [ "$SUCCESS_COUNT" -eq 0 ] && [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::All batches failed"
            exit 1
          fi
