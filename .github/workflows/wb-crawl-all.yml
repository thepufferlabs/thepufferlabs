name: World Bank Full Crawl

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "Year range (e.g. 2015:2025)"
        default: "2015:2025"
  schedule:
    - cron: "0 3 * * 0"

jobs:
  crawl:
    name: Bulk Crawl All Countries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Fetch and load
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATE_RANGE: ${{ github.event.inputs.date_range || '2015:2025' }}
        run: |
          set +e  # Don't abort on individual failures

          WB="https://api.worldbank.org/v2"
          INDICATORS=(
            NY.GDP.MKTP.CD NY.GDP.MKTP.KD.ZG NY.GDP.PCAP.CD NY.GDP.PCAP.KD.ZG
            FP.CPI.TOTL.ZG NE.TRD.GNFS.ZS BX.KLT.DINV.CD.WD
            SL.UEM.TOTL.ZS SL.TLF.CACT.ZS
            SP.POP.TOTL SP.POP.GROW SP.URB.TOTL.IN.ZS
            SP.DYN.LE00.IN SH.XPD.CHEX.GD.ZS
            SE.ADT.LITR.ZS SE.XPD.TOTL.GD.ZS
            EG.USE.ELEC.KH.PC IT.NET.USER.ZS
            EN.ATM.CO2E.PC NY.GNP.PCAP.CD
          )

          TOTAL_IND=${#INDICATORS[@]}
          TOTAL_ROWS=0
          FAIL_COUNT=0
          FAILS=""

          echo "========================================="
          echo "World Bank Bulk Crawl"
          echo "  Indicators: $TOTAL_IND"
          echo "  Date range: $DATE_RANGE"
          echo "  Strategy: 1 API call per indicator (all countries)"
          echo "========================================="
          echo ""

          echo "## World Bank Bulk Crawl" > /tmp/summary.md
          echo "" >> /tmp/summary.md
          echo "| # | Indicator | WB Rows | Upserted | Status |" >> /tmp/summary.md
          echo "|---|-----------|---------|----------|--------|" >> /tmp/summary.md

          for (( idx=0; idx<TOTAL_IND; idx++ )); do
            IND="${INDICATORS[$idx]}"
            NUM=$((idx+1))
            printf "%2d/%d %-25s " "$NUM" "$TOTAL_IND" "$IND"

            # ── Step 1: Fetch ALL countries for this indicator from WB API ──
            PAGE=1
            PAGES=1
            ALL_DATA="[]"

            while [ "$PAGE" -le "$PAGES" ]; do
              URL="${WB}/country/all/indicator/${IND}?format=json&per_page=10000&page=${PAGE}&date=${DATE_RANGE}"

              HTTP=$(curl -s -o /tmp/wb_raw.json -w "%{http_code}" --max-time 60 "$URL")

              if [ "$HTTP" != "200" ]; then
                echo "FAIL (WB API HTTP $HTTP)"
                FAIL_COUNT=$((FAIL_COUNT+1))
                FAILS="$FAILS $IND"
                echo "| $NUM | $IND | - | - | WB API $HTTP |" >> /tmp/summary.md
                break
              fi

              # Extract total pages from metadata [0].pages
              PAGES=$(jq -r '.[0].pages // 1' /tmp/wb_raw.json 2>/dev/null || echo 1)

              # Extract data, filter out WB aggregate/regional codes (not real countries)
              # Aggregates: AFE,AFW,ARB,CEB,CSS,EAP,EAR,EAS,ECA,ECS,EMU,EUU,FCS,HIC,HPC,
              # IBD,IBT,IDA,IDB,IDX,INX,LAC,LCN,LDC,LIC,LMC,LMY,LTE,MEA,MIC,MNA,NAC,
              # OED,OSS,PRE,PSS,PST,SAS,SSA,SSF,SST,TEA,TEC,TLA,TMN,TSA,TSS,UMC,WLD
              jq -c '
                .[1] // []
                | map(select(
                    .value != null
                    and .countryiso3code != null
                    and .countryiso3code != ""
                    and (.countryiso3code | length) == 3
                    and (.countryiso3code | test("^[A-Z]{3}$"))
                    and (.countryiso3code | IN("AFE","AFW","ARB","CEB","CSS","EAP","EAR","EAS","ECA","ECS","EMU","EUU","FCS","HIC","HPC","IBD","IBT","IDA","IDB","IDX","INX","LAC","LCN","LDC","LIC","LMC","LMY","LTE","MEA","MIC","MNA","NAC","OED","OSS","PRE","PSS","PST","SAS","SSA","SSF","SST","TEA","TEC","TLA","TMN","TSA","TSS","UMC","WLD") | not)
                  ))
                | map({
                    country_code: .countryiso3code,
                    indicator_code: .indicator.id,
                    year: (.date | tonumber),
                    value: .value,
                    unit: (.unit // null),
                    source_update_date: null,
                    ingested_at: (now | todate)
                  })
              ' /tmp/wb_raw.json > /tmp/wb_page.json 2>/dev/null || echo "[]" > /tmp/wb_page.json

              # Merge pages
              jq -s '.[0] + .[1]' <(echo "$ALL_DATA") /tmp/wb_page.json > /tmp/wb_merged.json
              ALL_DATA=$(cat /tmp/wb_merged.json)

              PAGE=$((PAGE+1))
            done

            # Skip if fetch failed
            [ "$HTTP" != "200" ] && continue

            ROW_COUNT=$(echo "$ALL_DATA" | jq 'length')
            printf "fetched=%s " "$ROW_COUNT"

            if [ "$ROW_COUNT" -eq 0 ]; then
              echo "skip (no data)"
              echo "| $NUM | $IND | 0 | 0 | No data |" >> /tmp/summary.md
              continue
            fi

            # ── Step 1b: Auto-insert missing countries ──
            # Extract unique country codes and upsert to wb_countries
            echo "$ALL_DATA" | jq -c '[.[] | {code: .country_code, name: .country_code, region: "Unknown", income_level: "Unknown"}] | unique_by(.code)' > /tmp/wb_countries.json
            curl -s -o /dev/null --max-time 15 \
              -X POST "${SUPABASE_URL}/rest/v1/wb_countries" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=minimal" \
              -d @/tmp/wb_countries.json 2>/dev/null || true

            # ── Step 2: Bulk upsert to Supabase in chunks of 500 ──
            UPSERTED=0
            CHUNK_SIZE=500
            CHUNKS=$(( (ROW_COUNT + CHUNK_SIZE - 1) / CHUNK_SIZE ))

            for (( c=0; c<CHUNKS; c++ )); do
              OFFSET=$((c * CHUNK_SIZE))
              echo "$ALL_DATA" | jq ".[$OFFSET:$((OFFSET+CHUNK_SIZE))]" > /tmp/wb_chunk.json

              UPSERT_HTTP=$(curl -s -o /tmp/wb_upsert.json -w "%{http_code}" --max-time 30 \
                -X POST "${SUPABASE_URL}/rest/v1/wb_indicator_values" \
                -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: resolution=merge-duplicates,return=minimal" \
                -d @/tmp/wb_chunk.json)

              if [ "$UPSERT_HTTP" -ge 200 ] 2>/dev/null && [ "$UPSERT_HTTP" -lt 300 ] 2>/dev/null; then
                CHUNK_LEN=$(jq 'length' /tmp/wb_chunk.json)
                UPSERTED=$((UPSERTED + CHUNK_LEN))
              else
                echo ""
                echo "  Upsert chunk $((c+1)) failed: HTTP $UPSERT_HTTP"
                cat /tmp/wb_upsert.json 2>/dev/null
              fi
            done

            TOTAL_ROWS=$((TOTAL_ROWS + UPSERTED))
            echo "upserted=$UPSERTED OK"
            echo "| $NUM | $IND | $ROW_COUNT | $UPSERTED | OK |" >> /tmp/summary.md
          done

          # ── Step 3: Refresh materialized views ──
          echo ""
          echo "Refreshing materialized views..."
          curl -s -o /dev/null --max-time 60 \
            -X POST "${SUPABASE_URL}/rest/v1/rpc/refresh_wb_materialized_views" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" -d '{}'
          echo "Views refreshed."

          # ── Step 3b: Refresh flat aggregation tables ──
          for RPC_NAME in refresh_wb_aggregations refresh_wb_bar_race; do
            echo "Calling $RPC_NAME..."
            RPC_HTTP=$(curl -s -o /tmp/rpc_out.json -w "%{http_code}" --max-time 120 \
              -X POST "${SUPABASE_URL}/rest/v1/rpc/${RPC_NAME}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" -d '{}')
            if [ "$RPC_HTTP" -ge 200 ] 2>/dev/null && [ "$RPC_HTTP" -lt 300 ] 2>/dev/null; then
              echo "$RPC_NAME OK"
            else
              echo "::warning::$RPC_NAME failed: HTTP $RPC_HTTP"
            fi
          done

          # ── Step 4: Create sync run record ──
          jq -n \
            --arg status "completed" \
            --argjson rows "$TOTAL_ROWS" \
            --argjson fails "$FAIL_COUNT" \
            '{status:$status,rows_inserted:$rows,rows_skipped:$fails,metadata:{method:"bulk-crawl"}}' \
            > /tmp/sync_run.json

          curl -s -o /dev/null --max-time 10 \
            -X POST "${SUPABASE_URL}/rest/v1/wb_sync_runs" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @/tmp/sync_run.json

          echo ""
          echo "========================================="
          echo "DONE  rows=$TOTAL_ROWS  failed=$FAIL_COUNT"
          [ -n "$FAILS" ] && echo "Failed indicators:$FAILS"
          echo "========================================="

          echo "" >> /tmp/summary.md
          echo "**Total rows:** $TOTAL_ROWS | **Failed:** $FAIL_COUNT" >> /tmp/summary.md
          [ -n "$FAILS" ] && echo "**Retry:**$FAILS" >> /tmp/summary.md
          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

          [ "$FAIL_COUNT" -eq "$TOTAL_IND" ] && exit 1 || true
