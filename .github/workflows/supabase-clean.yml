name: Supabase Clean DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE ALL DATA" to confirm'
        required: true
        type: string

jobs:
  clean:
    name: Clean All DB Data
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE ALL DATA'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Clean all data
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db query --linked <<'SQL'
          -- Truncate all app tables (order matters due to foreign keys)
          TRUNCATE public.audit_log CASCADE;
          TRUNCATE public.purchases CASCADE;
          TRUNCATE public.subscriptions CASCADE;
          TRUNCATE public.user_identities CASCADE;
          TRUNCATE public.profiles CASCADE;
          TRUNCATE public.products CASCADE;
          TRUNCATE public.schema_migrations CASCADE;

          -- Delete all auth users (triggers will not fire since profiles are already truncated)
          DELETE FROM auth.users;

          -- Clear avatar storage
          DELETE FROM storage.objects WHERE bucket_id = 'avatars';
          SQL

          echo "All data cleaned successfully."

  rejected:
    name: Confirmation Failed
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'DELETE ALL DATA'
    steps:
      - name: Abort
        run: |
          echo "Confirmation text did not match. No data was deleted."
          echo "You must type exactly: DELETE ALL DATA"
          exit 1
