name: Supabase Clean DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE ALL DATA" to confirm'
        required: true
        type: string
      scope:
        description: 'What to clean'
        required: true
        type: choice
        options:
          - data-only
          - full-schema-and-data
        default: data-only

jobs:
  clean:
    name: Clean DB
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE ALL DATA'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Step 1: Empty storage buckets via REST API (must happen before SQL)
      - name: Empty storage buckets
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in avatars free-content premium-content course-assets; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${BASE}/bucket/${bucket}/empty" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json")
            if [ "$code" = "200" ]; then
              echo "✅  Emptied: $bucket"
            else
              echo "⏭️  $bucket: HTTP $code (may not exist)"
            fi
          done

      # Step 2a: Full clean — delete buckets then drop all schema
      - name: Delete storage buckets
        if: inputs.scope == 'full-schema-and-data'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in free-content premium-content course-assets; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE "${BASE}/bucket/${bucket}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
            if [ "$code" = "200" ]; then
              echo "✅  Deleted: $bucket"
            else
              echo "⏭️  $bucket: HTTP $code"
            fi
          done

      - name: Drop all schema + data
        if: inputs.scope == 'full-schema-and-data'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "⚠️  Dropping ALL tables across all domains..."
          supabase db query --linked --file supabase/migrations/20260405_000_cleanup.sql
          echo "✅  Full schema cleaned"

      # Step 2b: Data only — truncate all tables, keep schema
      - name: Truncate all data
        if: inputs.scope == 'data-only'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db query --linked <<'SQL'
          DO $$
          DECLARE
            t TEXT;
            tables TEXT[] := ARRAY[
              -- Domain 5: Courses
              'user_bookmarks',
              'user_course_progress',
              'course_details',
              -- Domain 4: Payments
              'refunds',
              'orders',
              'coupons',
              -- Domain 3: Licensing
              'user_entitlements',
              'subscriptions',
              'bundle_products',
              'bundles',
              'plan_products',
              'plans',
              -- Domain 2: Products
              'product_content',
              'products',
              -- Domain 1: Users
              'audit_log',
              'user_identities',
              'profiles',
              'schema_migrations'
            ];
          BEGIN
            FOREACH t IN ARRAY tables LOOP
              IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema = 'public' AND table_name = t) THEN
                EXECUTE format('TRUNCATE public.%I CASCADE', t);
                RAISE NOTICE 'Truncated: %', t;
              END IF;
            END LOOP;
          END $$;

          -- Delete auth users
          DELETE FROM auth.users;
          SQL

          echo "✅  All data truncated (schema preserved)"

      - name: Summary
        run: |
          echo "## Database Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | \`${{ inputs.scope }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Storage | Emptied |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Complete |" >> $GITHUB_STEP_SUMMARY

  rejected:
    name: Confirmation Failed
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'DELETE ALL DATA'
    steps:
      - name: Abort
        run: |
          echo "Confirmation text did not match. No data was deleted."
          echo "You must type exactly: DELETE ALL DATA"
          exit 1
