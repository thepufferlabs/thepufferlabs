name: Supabase Clean DB

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to clean'
        required: true
        type: choice
        options:
          - features-only
          - features-and-data
          - nuclear
        default: features-only
      confirm:
        description: 'Type "DELETE" to confirm (or "NUCLEAR DELETE" for nuclear)'
        required: true
        type: string

jobs:
  clean:
    name: Clean DB
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          SCOPE="${{ inputs.scope }}"
          CONFIRM="${{ inputs.confirm }}"

          if [ "$SCOPE" = "nuclear" ] && [ "$CONFIRM" != "NUCLEAR DELETE" ]; then
            echo "::error::Nuclear cleanup requires typing exactly: NUCLEAR DELETE"
            exit 1
          fi

          if [ "$SCOPE" != "nuclear" ] && [ "$CONFIRM" != "DELETE" ]; then
            echo "::error::Cleanup requires typing exactly: DELETE"
            exit 1
          fi

          echo "Confirmed: $SCOPE cleanup"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Step 1: Empty storage buckets via REST API
      - name: Empty storage buckets
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in free-content premium-content course-assets avatars; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${BASE}/bucket/${bucket}/empty" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json")
            [ "$code" = "200" ] && echo "Emptied: $bucket" || echo "Skip: $bucket (HTTP $code)"
          done

      # Step 2a: features-only — drop product/commerce tables, keep auth intact
      - name: "Clean: features-only (domains 2-5)"
        if: inputs.scope == 'features-only'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Dropping feature tables (products, licensing, payments, courses)..."
          echo "Auth & profiles are PRESERVED."
          supabase db query --linked --file supabase/migrations/20260405_000_cleanup.sql
          echo "Done. Re-run migrations 002-005 to rebuild."

      # Step 2b: features-and-data — drop feature tables + truncate user data
      - name: "Clean: features + user data (domains 2-5 + truncate domain 1)"
        if: inputs.scope == 'features-and-data'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Dropping feature tables..."
          supabase db query --linked --file supabase/migrations/20260405_000_cleanup.sql

          echo "Truncating user data (keeping schema + auth triggers)..."
          supabase db query --linked <<'SQL'
          TRUNCATE audit_log CASCADE;
          TRUNCATE user_identities CASCADE;
          TRUNCATE profiles CASCADE;
          DELETE FROM auth.users;
          SQL

          echo "Done. Auth schema intact, all data cleared. Re-run 002-005."

      # Step 2c: nuclear — drop everything including foundation
      - name: "Clean: NUCLEAR (all domains)"
        if: inputs.scope == 'nuclear'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "!! NUCLEAR: Deleting storage buckets..."
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in free-content premium-content course-assets; do
            curl -s -o /dev/null -X DELETE "${BASE}/bucket/${bucket}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" || true
          done

          echo "!! NUCLEAR: Dropping ALL tables, functions, triggers, enums..."
          supabase db query --linked --file supabase/migrations/20260405_000_cleanup_nuclear.sql

          echo "!! NUCLEAR: Deleting all auth users..."
          supabase db query --linked "DELETE FROM auth.users;"

          echo "DONE. Everything is gone. Re-run ALL migrations (001-005)."

      - name: Summary
        run: |
          echo "## Database Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | \`${{ inputs.scope }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.scope }}" = "features-only" ]; then
            echo "| Auth | Preserved |" >> $GITHUB_STEP_SUMMARY
            echo "| Users | Preserved |" >> $GITHUB_STEP_SUMMARY
            echo "| Products | Dropped |" >> $GITHUB_STEP_SUMMARY
            echo "| Next step | Re-run migrations 002-005 |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ inputs.scope }}" = "features-and-data" ]; then
            echo "| Auth | Schema preserved, data cleared |" >> $GITHUB_STEP_SUMMARY
            echo "| Users | Deleted |" >> $GITHUB_STEP_SUMMARY
            echo "| Products | Dropped |" >> $GITHUB_STEP_SUMMARY
            echo "| Next step | Re-run migrations 002-005 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Auth | DROPPED |" >> $GITHUB_STEP_SUMMARY
            echo "| Users | DELETED |" >> $GITHUB_STEP_SUMMARY
            echo "| Everything | GONE |" >> $GITHUB_STEP_SUMMARY
            echo "| Next step | Re-run ALL migrations 001-005 |" >> $GITHUB_STEP_SUMMARY
          fi
