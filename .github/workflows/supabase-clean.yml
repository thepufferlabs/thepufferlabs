name: Supabase Clean DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE ALL DATA" to confirm'
        required: true
        type: string
      scope:
        description: 'What to clean'
        required: true
        type: choice
        options:
          - data-only
          - full-schema-and-data
        default: data-only

jobs:
  clean:
    name: Clean DB
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE ALL DATA'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Clean — full schema + data (products, entitlements, storage)
        if: inputs.scope == 'full-schema-and-data'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "⚠️  Dropping ALL product/entitlement tables, storage, and data..."
          supabase db query --linked --file supabase/migrations/20260405_000_cleanup.sql
          echo "✅  Product schema cleaned"

      - name: Clean — data only (truncate all tables)
        if: inputs.scope == 'data-only'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db query --linked <<'SQL'
          -- Truncate product/commerce tables
          TRUNCATE public.user_entitlements CASCADE;
          TRUNCATE public.subscriptions CASCADE;
          TRUNCATE public.orders CASCADE;
          TRUNCATE public.coupons CASCADE;
          TRUNCATE public.bundle_products CASCADE;
          TRUNCATE public.bundles CASCADE;
          TRUNCATE public.plan_products CASCADE;
          TRUNCATE public.plans CASCADE;
          TRUNCATE public.product_content CASCADE;
          TRUNCATE public.products CASCADE;

          -- Truncate user tables
          TRUNCATE public.audit_log CASCADE;
          TRUNCATE public.purchases CASCADE;
          TRUNCATE public.user_identities CASCADE;
          TRUNCATE public.profiles CASCADE;
          TRUNCATE public.schema_migrations CASCADE;

          -- Delete auth users
          DELETE FROM auth.users;
          SQL

          echo "✅  All data truncated"

      - name: Empty storage buckets
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in avatars free-content premium-content course-assets; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${BASE}/bucket/${bucket}/empty" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json")
            if [ "$code" = "200" ]; then
              echo "✅  Emptied bucket: $bucket"
            else
              echo "⏭️  Bucket $bucket: HTTP $code (may not exist)"
            fi
          done

      - name: Summary
        run: |
          echo "## Database Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | \`${{ inputs.scope }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Storage | Emptied |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Complete |" >> $GITHUB_STEP_SUMMARY

  rejected:
    name: Confirmation Failed
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'DELETE ALL DATA'
    steps:
      - name: Abort
        run: |
          echo "Confirmation text did not match. No data was deleted."
          echo "You must type exactly: DELETE ALL DATA"
          exit 1
