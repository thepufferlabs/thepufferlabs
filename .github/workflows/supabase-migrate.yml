name: Supabase Migration

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/*.sql"
  workflow_dispatch:

jobs:
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Ensure schema_migrations table exists
          supabase db query --linked <<'SQL'
          CREATE TABLE IF NOT EXISTS public.schema_migrations (
            version TEXT PRIMARY KEY,
            name TEXT NOT NULL,
            executed_at TIMESTAMPTZ DEFAULT now()
          );
          SQL

          # Run each migration in order, skip cleanup and already-applied
          for file in supabase/migrations/*.sql; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .sql)

            # Skip cleanup script
            if echo "$name" | grep -q "_000_cleanup"; then
              echo "⏭️  Skipping cleanup (manual only)"
              continue
            fi

            # Extract version: 20260405_001
            version=$(echo "$name" | grep -oP '^\d+_\d+')

            # Check if already applied
            result=$(supabase db query --linked --output csv \
              "SELECT version FROM public.schema_migrations WHERE version = '$version'" 2>/dev/null || echo "")

            if echo "$result" | grep -q "$version"; then
              echo "⏭️  $name (already applied)"
            else
              echo "▶️  Applying $name..."
              supabase db query --linked --file "$file"
              echo "✅  $name"
            fi
          done

      - name: Migration status
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Applied Migrations ==="
          supabase db query --linked \
            "SELECT version, name, executed_at FROM public.schema_migrations ORDER BY version"

      - name: Summary
        run: |
          echo "## Migrations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          for file in supabase/migrations/*.sql; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .sql)
            echo "| \`$name\` | Applied |" >> $GITHUB_STEP_SUMMARY
          done
