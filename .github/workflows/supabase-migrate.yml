name: Supabase Migration

on:
  push:
    branches: [main]
    paths:
      - "scripts/migrations/*.sql"
      - "scripts/supabase-schema.sql"
      - "supabase/migrations/*.sql"
  workflow_dispatch:

jobs:
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run incremental migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Ensure schema_migrations table exists
          supabase db query --linked <<'SQL'
          CREATE TABLE IF NOT EXISTS public.schema_migrations (
            version TEXT PRIMARY KEY,
            name TEXT NOT NULL,
            executed_at TIMESTAMPTZ DEFAULT now()
          );
          SQL

          # Run migrations from scripts/migrations/ (legacy)
          for file in scripts/migrations/*.sql; do
            [ -f "$file" ] || continue
            version=$(basename "$file" | cut -d'_' -f1)
            name=$(basename "$file" .sql)

            result=$(supabase db query --linked --output csv \
              "SELECT version FROM public.schema_migrations WHERE version = '$version'")

            if echo "$result" | grep -q "$version"; then
              echo "⏭️  Skipping $name (already applied)"
            else
              echo "▶️  Applying $name..."
              supabase db query --linked --file "$file"
              echo "✅  Applied $name"
            fi
          done

          # Run migrations from supabase/migrations/ (new standard path)
          for file in supabase/migrations/*.sql; do
            [ -f "$file" ] || continue

            # Skip cleanup script — that's manual only
            if echo "$file" | grep -q "_000_cleanup"; then
              echo "⏭️  Skipping cleanup script (manual only)"
              continue
            fi

            version=$(basename "$file" | cut -d'_' -f1-2)
            name=$(basename "$file" .sql)

            result=$(supabase db query --linked --output csv \
              "SELECT version FROM public.schema_migrations WHERE version = '$version'")

            if echo "$result" | grep -q "$version"; then
              echo "⏭️  Skipping $name (already applied)"
            else
              echo "▶️  Applying $name..."
              supabase db query --linked --file "$file"

              # Record migration
              supabase db query --linked \
                "INSERT INTO public.schema_migrations (version, name) VALUES ('$version', '$name') ON CONFLICT (version) DO NOTHING"
              echo "✅  Applied $name"
            fi
          done

      - name: Show migration status
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Applied Migrations ==="
          supabase db query --linked "SELECT version, name, executed_at FROM public.schema_migrations ORDER BY version"
