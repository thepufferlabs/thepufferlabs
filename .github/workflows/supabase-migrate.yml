name: Supabase Migration

on:
  push:
    branches: [main]
    paths:
      - "scripts/supabase-schema.sql"
  workflow_dispatch:

jobs:
  migrate:
    name: Run Supabase Migration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migration via db query
        run: supabase db query --file scripts/supabase-schema.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migration
        run: |
          echo "Migration completed successfully."
          echo "Tables created: profiles, user_identities, subscriptions, audit_log, products, purchases"
          echo "Functions: handle_new_user, handle_user_login, update_updated_at, has_premium_access"
